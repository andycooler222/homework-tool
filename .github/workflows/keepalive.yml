    steps:
      - name: Ping Supabase
        run: |
          curl -sf --connect-timeout 10 \
            "https://eyqbflykrgnopqxncyzl.supabase.co/rest/v1/homework?select=count" \
            -H "apikey: sb_publishable_dIqF0694gYRmNvEdeVspUg_VJmjLeLE" \
            -H "Authorization: Bearer sb_publishable_dIqF0694gYRmNvEdeVspUg_VJmjLeLE" \
            && echo "OK" || echo "FAIL"
